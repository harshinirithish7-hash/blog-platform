<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📝 Blog Platform With Comments</h1>

    <div class="form-box">
        <input type="text" id="title" placeholder="Enter Blog Title">
        <textarea id="content" placeholder="Write your blog..."></textarea>
        <button onclick="addPost()">Publish Post</button>
    </div>

    <div id="blogContainer"></div>
</div>

<script src="script.js"></script>
</body>
</html>
